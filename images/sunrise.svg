<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="75%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="220" fill="url(#sky)"/>
  <rect width="400" height="220" fill="url(#glow)"/>
  <!-- horizon -->
  <line x1="0" y1="170" x2="400" y2="170" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <!-- sun -->
  <path d="M120,170 A80,80 0 0,1 280,170 Z" fill="#f59e0b" opacity="0.95"/>
  <!-- rays -->
  <line x1="200" y1="82" x2="200" y2="60"  stroke="#f59e0b" stroke-width="2" opacity="0.55"/>
  <line x1="246" y1="96" x2="261" y2="78"  stroke="#f59e0b" stroke-width="2" opacity="0.55"/>
  <line x1="154" y1="96" x2="139" y2="78"  stroke="#f59e0b" stroke-width="2" opacity="0.55"/>
  <line x1="278" y1="135" x2="300" y2="124" stroke="#f59e0b" stroke-width="2" opacity="0.45"/>
  <line x1="122" y1="135" x2="100" y2="124" stroke="#f59e0b" stroke-width="2" opacity="0.45"/>
  <!-- reflection on ground -->
  <rect x="0" y="170" width="400" height="50" fill="#0f172a"/>
  <rect x="170" y="170" width="60" height="50" fill="#f59e0b" opacity="0.12"/>
</svg>
