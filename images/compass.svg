<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <rect width="400" height="220" fill="#0f172a"/>
  <!-- outer ring -->
  <circle cx="200" cy="110" r="88" fill="none" stroke="#1f2937" stroke-width="1.5"/>
  <circle cx="200" cy="110" r="82" fill="none" stroke="#374151" stroke-width="1"/>
  <!-- tick marks at cardinal points -->
  <line x1="200" y1="28" x2="200" y2="38" stroke="#6b7280" stroke-width="2"/>
  <line x1="200" y1="182" x2="200" y2="192" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="118" y1="110" x2="128" y2="110" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="272" y1="110" x2="282" y2="110" stroke="#6b7280" stroke-width="1.5"/>
  <!-- labels -->
  <text x="200" y="23" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="13" font-weight="700">N</text>
  <text x="200" y="206" text-anchor="middle" fill="#4b5563" font-family="system-ui,sans-serif" font-size="11">S</text>
  <text x="108" y="115" text-anchor="middle" fill="#4b5563" font-family="system-ui,sans-serif" font-size="11">W</text>
  <text x="292" y="115" text-anchor="middle" fill="#4b5563" font-family="system-ui,sans-serif" font-size="11">E</text>
  <!-- needle: north (green) -->
  <polygon points="200,42 207,110 193,110" fill="#10b981"/>
  <!-- needle: south (dark) -->
  <polygon points="200,178 207,110 193,110" fill="#374151"/>
  <!-- center hub -->
  <circle cx="200" cy="110" r="8" fill="#111827" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="200" cy="110" r="3" fill="#10b981"/>
</svg>
